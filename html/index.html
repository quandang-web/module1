<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên - SMS</title>
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>

    <!-- 📱 NÚTOGGLE SIDEBAR CHO MOBILE -->
    <button id="sidebar-toggle" onclick="toggleSidebarMobile()">☰</button>

    <div class="layout">

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">

            <h2>🎓 SMS</h2>

            <!-- Thông tin tài khoản đăng nhập -->
            <div id="sidebar-user-profile" class="user-profile-sidebar" style="display: none;">
                <div class="name" id="user-display-name">Guest</div>
                <div class="role" id="user-display-role">User</div>
            </div>

            <!-- Các nút chức năng chính -->
            <button id="btn-dashboard" onclick="hienThiDashboard(); closeSidebarMobile()">🏠 Dashboard</button>
            <button id="btn-students" onclick="hienThiHome(); closeSidebarMobile()">👨‍🎓 Sinh viên</button>
            <button id="btn-add-student" onclick="hienThiFormTao(); closeSidebarMobile()">➕ Thêm sinh viên</button>
            <button id="btn-classes" onclick="hienThiDanhSachLop(); closeSidebarMobile()">🏫 Quản lý lớp</button>
            <button id="btn-add-class" onclick="hienThiFormThemLop(); closeSidebarMobile()">➕ Thêm lớp</button>
            
            <hr id="sidebar-divider">

            <!-- Các nút Đăng nhập / Đăng ký / Đăng xuất -->
            <button id="btn-login" onclick="hienThiDangNhap(); closeSidebarMobile()">🔑 Đăng nhập</button>
            <button id="btn-register" onclick="hienThiDangKy(); closeSidebarMobile()">📝 Đăng ký</button> 
            <button id="btn-logout" onclick="dangXuat()" style="display: none;">🚪 Đăng xuất</button>

            <!-- Khung tìm kiếm ở sidebar -->
            <div class="search-wrapper" id="sidebar-search-wrapper">
                <hr>
                <input type="text" id="keyword" placeholder="Tìm sinh viên nhanh..." oninput="timKiemSinhVienNhanh()">
            </div>

        </div>

        <!-- Nội dung -->
        <div class="content">

            <div class="header">
                <div>
                    <h1>Student Management System</h1>
                    <p id="header-subtitle">Hệ thống quản lý thông tin học tập của học viên</p>
                </div>
                <div id="header-user-badge"></div>
            </div>

            <!-- Nơi render nội dung động -->
            <div id="main">
                <!-- Nội dung sẽ được hiển thị qua index.js -->
            </div>

        </div>

    </div>

    <!-- Nạp các lớp Model trước -->
    <script src="/js/student/Student.js"></script>
    <script src="/js/class/ClassRoom.js"></script>
    <script src="/js/account/Account.js"></script>

    <!-- Nạp các lớp Manager chứa logic dữ liệu -->
    <script src="/js/student/StudentManager.js"></script>
    <script src="/js/class/ClassManager.js"></script>
    <script src="/js/account/AccountManager.js"></script>

    <!-- Nạp file điều khiển giao diện chính -->
    <script src="/js/index.js"></script>

    <!-- Script cho mobile sidebar toggle -->
    <script>
        function toggleSidebarMobile() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
            document.getElementById('sidebar-toggle').classList.toggle('close-icon');
        }

        function closeSidebarMobile() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebar-toggle');
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('active');
                toggle.classList.remove('close-icon');
            }
        }

        // Đóng sidebar khi bấm ngoài
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebar-toggle');
            if (!sidebar.contains(event.target) && !toggle.contains(event.target)) {
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('active');
                    toggle.classList.remove('close-icon');
                }
            }
        });
    </script>

</body>
</html>
